<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Só Hélices</title>

    <link
      rel="icon"
      type="image/png"
      href="https://sohelices.com.br/wp-content/uploads/2026/03/logo-sohelices-favicon.png"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .box {
        background: white;
        padding: 40px;
        border-radius: 14px;
        width: 340px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }

      .logo {
        text-align: center;
        margin-bottom: 25px;
      }

      .logo img {
        width: 120px;
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 13px;
        margin-bottom: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #ff008c;
        box-shadow: 0 0 0 3px rgba(255, 0, 140, 0.1);
      }

      button {
        width: 100%;
        padding: 13px;
        background: #ff008c;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      button:hover {
        background: #e6007e;
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(255, 0, 140, 0.25);
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: #888;
        margin-top: 18px;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="logo">
        <img
          src="https://sohelices.com.br/wp-content/uploads/2025/04/Logo-site-1.webp"
        />
      </div>

      <h2>Painel de Orçamentos<br />Só Hélices</h2>

      <input id="usuario" placeholder="Usuário" />
      <input id="senha" type="password" placeholder="Senha" />

      <button onclick="login()">Entrar</button>

      <div class="footer">*Sistema interno*</div>
    </div>

    <script>
      async function login() {
        const usuario = document.getElementById("usuario").value;
        const senha = document.getElementById("senha").value;

        const form = new URLSearchParams();

        form.append("username", usuario);
        form.append("password", senha);

        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: form,
        });

        if (response.ok) {
          const data = await response.json();

          localStorage.setItem("token", data.access_token);

          window.location.href = "index.html";
        } else {
          alert("Login inválido");
        }
      }
    </script>
  </body>
</html>
